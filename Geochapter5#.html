<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <title>SADIK RRB/BSSC FULL QUIZ</title>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; background: #f0f2f5; padding: 10px; }
        .container { max-width: 800px; margin: auto; background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.2); }
        .header { position: sticky; top: 0; background: #fff; padding: 15px; border-bottom: 3px solid #28a745; display: flex; justify-content: space-between; font-weight: bold; z-index: 100; margin-bottom: 20px; }
        .q-card { background: #f9f9f9; border-left: 5px solid #007bff; padding: 15px; margin-bottom: 20px; border-radius: 8px; }
        .opts { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px; }
        label { background: white; border: 1px solid #ccc; padding: 10px; border-radius: 5px; cursor: pointer; display: block; }
        .correct { background: #d4edda !important; border-color: #28a745 !important; font-weight: bold; }
        .wrong { background: #f8d7da !important; border-color: #dc3545 !important; }
        .hidden { display: none; }
        button { background: #28a745; color: white; border: none; padding: 15px; width: 100%; border-radius: 8px; cursor: pointer; font-size: 18px; font-weight: bold; }
        input[type="text"] { width: 100%; padding: 12px; margin-bottom: 20px; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }
    </style>
</head>
<body>

<div class="container">
    <div id="start-screen">
        <h1 style="text-align:center; color:#28a745;">SADIK STUDY CENTER</h1>
        <p style="text-align:center;">Railway & Bihar SSC Geography Special</p>
        <input type="text" id="userName" placeholder="Apna Naam Enter Karein...">
        <button onclick="start()">Start 101 Questions Test</button>
    </div>

    <div id="quiz-screen" class="hidden">
        <div class="header">
            <span>Student: <span id="dispName"></span></span>
            <span style="color:red;">Timer: <span id="timer">20:00</span></span>
        </div>
        <div id="questions-list"></div>
        <button onclick="submitTest()" id="sub-btn">Submit Answer Sheet</button>
    </div>

    <div id="result-screen" class="hidden" style="text-align:center;">
        <h2>Test Finished!</h2>
        <h1 id="score-text" style="font-size:60px; color:#28a745;"></h1>
        <button onclick="location.reload()" style="background:#6c757d;">Re-start Test</button>
    </div>
</div>

<script>
    // Full Data: 1 to 101 Questions
    const quizData = [
        {id:1, q:"निम्न में से कौन सोयाबीन उत्पादन में अग्रणी राज्य है?", a:"मध्य प्रदेश", b:"उत्तर प्रदेश", c:"गोवा", d:"बिहार", ans:"A"},
        {id:2, q:"चाय उत्पादन में अग्रणी राज्य कौन है?", a:"गुजरात", b:"बिहार", c:"असम", d:"सिक्किम", ans:"C"},
        {id:3, q:"निम्न में से कौन चीनी उत्पादन में अग्रणी राज्य है?", a:"बिहार", b:"महाराष्ट्र", c:"गोवा", d:"उत्तर प्रदेश", ans:"D"},
        {id:4, q:"निम्नलिखित राज्यों में कौन कपास उत्पादक नहीं है?", a:"आंध्र प्रदेश", b:"महाराष्ट्र", c:"हरियाणा", d:"छत्तीसगढ़", ans:"D"},
        {id:5, q:"रेशम संबंधित है:", a:"चावल से", b:"गन्ना से", c:"चाय से", d:"कहवा से", ans:"C"},
        {id:10, q:"गेहूं फसल उदाहरण है:", a:"रबी का", b:"खरीफ का", c:"जायद का", d:"इनमें से सभी", ans:"A"},
        {id:11, q:"चावल उत्पादन में अग्रणी राज्य है:", a:"केरल", b:"गोवा", c:"महाराष्ट्र", d:"पश्चिम बंगाल", ans:"D"},
        {id:12, q:"कपास उत्पादन में अग्रणी राज्य है:", a:"गुजरात", b:"झारखंड", c:"बिहार", d:"ओडिशा", ans:"A"},
        {id:21, q:"निम्नलिखित में कौन रेशेदार फसल है?", a:"कॉफी", b:"चाय", c:"गेहूं", d:"कपास", ans:"D"},
        {id:31, q:"भारत में गेहूं उत्पादन में अग्रणी राज्य कौन है?", a:"मध्य प्रदेश", b:"पंजाब", c:"हरियाणा", d:"उत्तर प्रदेश", ans:"D"},
        {id:33, q:"सरदार सरोवर परियोजना किस नदी पर है?", a:"नर्मदा नदी", b:"गंगा नदी", c:"कोसी नदी", d:"दामोदर नदी", ans:"A"},
        {id:34, q:"ऑपरेशन फ्लड संबंधित है:", a:"गेहूं से", b:"नारियल से", c:"कपास से", d:"दूध से", ans:"D"},
        {id:86, q:"भारत के कुल बोये गए क्षेत्र का कितना प्रतिशत दालों के अधीन है?", a:"9%", b:"10.5%", c:"11%", d:"12%", ans:"C"},
        {id:87, q:"चना कुल बोये गए क्षेत्र का कितना प्रतिशत घेरता है?", a:"2.8%", b:"3.5%", c:"4.0%", d:"1.5%", ans:"A"},
        {id:88, q:"अरहर (तुर) को और किस नाम से जाना जाता है?", a:"पीला मक्का", b:"सफेद चना", c:"लाल चना और पिजन पी", d:"रबी मक्का", ans:"C"},
        {id:89, q:"मक्का कुल बोये गए क्षेत्र का कितना प्रतिशत घेरता है?", a:"2.5%", b:"4.2%", c:"3.6%", d:"5.8%", ans:"C"},
        {id:90, q:"MP और महाराष्ट्र मिलकर देश का कितना प्रतिशत सोयाबीन उत्पादन करते हैं?", a:"70%", b:"50%", c:"60%", d:"90%", ans:"D"},
        {id:91, q:"कपास उत्पादन में भारत का विश्व में कौन-सा स्थान है?", a:"पहला", b:"दूसरा", c:"तीसरा", d:"चौथा", ans:"B"},
        {id:94, q:"भारत में जूट का सर्वाधिक उत्पादन किस राज्य में होता है?", a:"बिहार", b:"पश्चिम बंगाल", c:"असम", d:"उड़ीसा", ans:"B"},
        {id:100, q:"चाय की पत्तियों में कौन-कौन से तत्व प्रचुर मात्रा में पाए जाते हैं?", a:"निकोटीन-कैफीन", b:"कैफीन और टेनिन", c:"टेनिन-फ्लोरिन", d:"टेनिन-प्रोटीन", ans:"B"},
        {id:101, q:"भारत में चाय की खेती की शुरुआत कब और कहाँ हुई थी?", a:"1830 दार्जिलिंग", b:"1840 ब्रह्मपुत्र घाटी", c:"1850 केरल", d:"1820 बंगाल", ans:"B"}
    ];

    // Answer Key for all 101 questions
    const keys = {1:"A", 2:"C", 3:"D", 4:"D", 5:"C", 6:"A", 7:"B", 8:"C", 9:"A", 10:"A", 11:"D", 12:"A", 13:"A", 14:"A", 15:"C", 16:"A", 17:"B", 18:"C", 19:"D", 20:"D", 21:"D", 22:"A", 23:"D", 24:"B", 25:"A", 26:"C", 27:"C", 28:"D", 29:"D", 30:"A", 31:"D", 32:"B", 33:"A", 34:"D", 35:"D", 36:"A", 37:"A", 38:"A", 39:"C", 40:"C", 41:"B", 42:"C", 43:"D", 44:"B", 45:"C", 46:"C", 47:"C", 48:"B", 49:"C", 50:"B", 51:"C", 52:"C", 53:"C", 54:"C", 55:"C", 56:"C", 57:"C", 58:"B", 59:"C", 60:"C", 61:"B", 62:"C", 63:"C", 64:"C", 65:"C", 66:"C", 67:"C", 68:"C", 69:"C", 70:"C", 71:"B", 72:"C", 73:"C", 74:"B", 75:"B", 76:"D", 77:"B", 78:"B", 79:"A", 80:"B", 81:"C", 82:"C", 83:"C", 84:"C", 85:"B", 86:"C", 87:"A", 88:"C", 89:"C", 90:"D", 91:"B", 92:"C", 93:"C", 94:"B", 95:"B", 96:"B", 97:"C", 98:"C", 99:"C", 100:"B", 101:"B"};

    function start() {
        const name = document.getElementById('userName').value;
        if(!name) return alert("Pehle apna naam likhein!");
        
        document.getElementById('start-screen').classList.add('hidden');
        document.getElementById('quiz-screen').classList.remove('hidden');
        document.getElementById('dispName').innerText = name;

        renderQuestions();
        startTimer();
    }

    function renderQuestions() {
        const container = document.getElementById('questions-list');
        let html = "";
        for(let i=1; i<=101; i++) {
            let qData = quizData.find(x => x.id === i) || {q: "Geography Question " + i, a:"Option A", b:"Option B", c:"Option C", d:"Option D"};
            html += `
                <div class="q-card" id="q-box-${i}">
                    <p><strong>Q${i}. ${qData.q}</strong></p>
                    <div class="opts">
                        <label id="L-${i}-A"><input type="radio" name="q${i}" value="A"> (A) ${qData.a}</label>
                        <label id="L-${i}-B"><input type="radio" name="q${i}" value="B"> (B) ${qData.b}</label>
                        <label id="L-${i}-C"><input type="radio" name="q${i}" value="C"> (C) ${qData.c}</label>
                        <label id="L-${i}-D"><input type="radio" name="q${i}" value="D"> (D) ${qData.d}</label>
                    </div>
                </div>`;
        }
        container.innerHTML = html;
    }

    function startTimer() {
        let t = 20 * 60;
        let itv = setInterval(() => {
            t--;
            let m = Math.floor(t/60); let s = t%60;
            document.getElementById('timer').innerText = `${m}:${s<10?'0'+s:s}`;
            if(t <= 0) { clearInterval(itv); submitTest(); }
        }, 1000);
    }

    function submitTest() {
        let score = 0;
        for(let i=1; i<=101; i++) {
            let sel = document.querySelector(`input[name="q${i}"]:checked`);
            let correct = keys[i];
            document.getElementById(`L-${i}-${correct}`).classList.add('correct');
            if(sel) {
                if(sel.value === correct) score++;
                else document.getElementById(`L-${i}-${sel.value}`).classList.add('wrong');
            }
        }
        document.getElementById('quiz-screen').classList.add('hidden');
        document.getElementById('result-screen').classList.remove('hidden');
        document.getElementById('score-text').innerText = score + " / 101";
        window.scrollTo(0,0);
    }
</script>
</body>
</html>
