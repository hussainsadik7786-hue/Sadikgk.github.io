<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sadik's Railway Quiz - Page 38</title>
    <style>
        :root { --main-red: #d32f2f; --bg-color: #fff5f5; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background-color: var(--bg-color); margin: 0; padding: 15px; }
        .container { max-width: 700px; margin: auto; background: white; padding: 25px; border-radius: 15px; box-shadow: 0 5px 20px rgba(0,0,0,0.1); }
        
        #timer-box { position: sticky; top: 10px; z-index: 100; background: var(--main-red); color: white; padding: 12px; text-align: center; font-size: 22px; font-weight: bold; border-radius: 10px; margin-bottom: 20px; }

        .q-card { position: relative; border: 1px solid #ffcdd2; padding: 20px; margin-bottom: 25px; border-radius: 12px; background: #fff; overflow: hidden; }
        
        /* Sadik Red Watermark */
        .q-card::before {
            content: "Sadik";
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%) rotate(-25deg);
            font-size: 75px;
            color: rgba(211, 47, 47, 0.07);
            font-weight: 900;
            pointer-events: none;
            z-index: 0;
        }

        .q-text { position: relative; z-index: 1; font-size: 19px; font-weight: bold; color: #333; margin-bottom: 15px; }
        .options { position: relative; z-index: 1; display: flex; flex-direction: column; gap: 10px; }
        .opt { padding: 12px; border: 1px solid #ddd; border-radius: 8px; cursor: pointer; transition: 0.2s; background: rgba(255,255,255,0.8); }
        .opt:hover { background: #ffebee; }
        
        .selected { border: 2px solid var(--main-red); background: #ffebee; }
        .correct { background: #c8e6c9 !important; border-color: #2e7d32; color: #1b5e20; font-weight: bold; }
        .wrong { background: #ffcdd2 !important; border-color: #c62828; color: #b71c1c; }

        .btn { width: 100%; padding: 15px; background: var(--main-red); color: white; border: none; border-radius: 10px; font-size: 18px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        #result { display: none; text-align: center; padding: 20px; border: 3px dashed var(--main-red); border-radius: 12px; margin-bottom: 20px; font-size: 24px; color: var(--main-red); background: white; }
        
        #start-screen { text-align: center; padding: 50px 10px; }
        input { padding: 12px; width: 80%; font-size: 18px; border: 2px solid var(--main-red); border-radius: 8px; margin-bottom: 20px; }
    </style>
</head>
<body>

<div class="container" id="start-screen">
    <h1 style="color: var(--main-red);">Railway Study - Page 38</h1>
    <p>अपना शुभ नाम दर्ज करें:</p>
    <input type="text" id="username" placeholder="यहाँ नाम लिखें...">
    <button class="btn" onclick="init()">टेस्ट शुरू करें</button>
</div>

<div class="container" id="quiz-screen" style="display:none;">
    <div id="timer-box">समय शेष: 10:00</div>
    <div id="result"></div>
    <div id="quiz-engine"></div>
    <button class="btn" id="submit-btn" onclick="showResults()">टेस्ट सबमिट करें</button>
</div>

<script>
let userName = "";
const mcqs = [
    { q: "मध्य प्रदेश की राजधानी कहाँ है?", o: ["इंदौर", "भोपाल", "ग्वालियर", "जबलपुर"], a: 1 },
    { q: "तड़ित चालक का आविष्कार किसने किया था?", o: ["न्यूटन", "बेंजामिन फ्रेंकलिन", "आइंस्टीन", "फैराडे"], a: 1 },
    { q: "विश्व की सबसे लंबी नदी कौन सी है?", o: ["अमेज़न", "नील", "गंगा", "मिसिसिपी"], a: 1 },
    { q: "भारत का स्विट्जरलैंड किसे कहा जाता है?", o: ["शिमला", "कश्मीर", "मनाली", "नैनीताल"], a: 1 },
    { q: "संविधान के किस अनुच्छेद में हिंदी को राजभाषा घोषित किया गया है?", o: ["अनुच्छेद 343", "अनुच्छेद 352", "अनुच्छेद 360", "अनुच्छेद 370"], a: 0 },
    { q: "आधुनिक हिंदी का जनक किसे माना जाता है?", o: ["प्रेमचंद", "भारतेंदु हरिश्चंद्र", "निराला", "प्रसाद"], a: 1 },
    { q: "मानव शरीर में कुल कितनी हड्डियाँ होती हैं?", o: ["200", "206", "210", "215"], a: 1 },
    { q: "विटामिन B12 में कौन सा तत्व पाया जाता है?", o: ["लोहा", "कोबाल्ट", "मैग्नीशियम", "जस्ता"], a: 1 },
    { q: "सार्क (SAARC) का मुख्यालय कहाँ है?", o: ["नई दिल्ली", "काठमांडू", "ढाका", "कोलंबो"], a: 1 },
    { q: "दूध का रंग सफेद किसकी उपस्थिति के कारण होता है?", o: ["कैरोटीन", "केसीन", "लैक्टोज", "कोई नहीं"], a: 1 },
    { q: "भारतीय संविधान सभा के अध्यक्ष कौन थे?", o: ["नेहरू", "डॉ. राजेंद्र प्रसाद", "अंबेडकर", "गांधी"], a: 1 },
    { q: "मछली के हृदय में कितने कोष्ठ (Chamber) होते हैं?", o: ["दो", "तीन", "चार", "एक"], a: 0 },
    { q: "ध्वनि की गति अधिकतम किसमें होती है?", o: ["वायु", "जल", "इस्पात (Steel)", "निर्वात"], a: 2 },
    { q: "रक्त का थक्का जमने में कौन सा विटामिन सहायक है?", o: ["विटामिन A", "विटामिन C", "विटामिन K", "विटामिन E"], a: 2 },
    { q: "विश्व का सबसे बड़ा मरुस्थल कौन सा है?", o: ["थार", "सहारा", "गोबी", "कालाहारी"], a: 1 },
    { q: "भारत की पहली महिला राज्यपाल कौन थी?", o: ["सुचेता कृपलानी", "सरोजिनी नायडू", "इंदिरा गांधी", "पद्मजा नायडू"], a: 1 },
    { q: "इंकलाब जिंदाबाद का नारा किसने दिया था?", o: ["सुभाष चंद्र बोस", "भगत सिंह", "आजाद", "तिलक"], a: 1 },
    { q: "जल का शुद्धतम रूप क्या है?", o: ["नल का पानी", "वर्षा का जल", "समुद्र का जल", "आसुत जल"], a: 1 },
    { q: "सौर मंडल का सबसे बड़ा ग्रह कौन सा है?", o: ["पृथ्वी", "शनि", "बृहस्पति", "मंगल"], a: 2 },
    { q: "कम्प्यूटर का मस्तिष्क किसे कहा जाता है?", o: ["RAM", "CPU", "Hard Disk", "Monitor"], a: 1 },
    { q: "गेटवे ऑफ इंडिया कहाँ स्थित है?", o: ["नई दिल्ली", "मुंबई", "कोलकाता", "चेन्नई"], a: 1 },
    { q: "कथकली किस राज्य का शास्त्रीय नृत्य है?", o: ["तमिलनाडु", "केरल", "आंध्र प्रदेश", "ओडिशा"], a: 1 },
    { q: "ओणम किस राज्य का प्रसिद्ध त्योहार है?", o: ["केरल", "तमिलनाडु", "कर्नाटक", "असोम"], a: 0 },
    { q: "विटामिन C का रासायनिक नाम क्या है?", o: ["रेटिनॉल", "एस्कॉर्बिक एसिड", "थायमिन", "कैल्सीफेरॉल"], a: 1 },
    { q: "मानव हृदय एक मिनट में कितनी बार धड़कता है?", o: ["60 बार", "72 बार", "80 बार", "90 बार"], a: 1 },
    { q: "भारत में सबसे पहले सूर्य किस राज्य में निकलता है?", o: ["असोम", "अरुणाचल प्रदेश", "सिक्किम", "मेघालय"], a: 1 },
    { q: "बिहु किस राज्य का मुख्य त्योहार है?", o: ["बिहार", "असोम", "ओडिशा", "बंगाल"], a: 1 },
    { q: "संविधान सभा की प्रारूप समिति के अध्यक्ष कौन थे?", o: ["राजेंद्र प्रसाद", "बी.आर. अंबेडकर", "पटेल", "आजाद"], a: 1 },
    { q: "हवामहल कहाँ स्थित है?", o: ["उदयपुर", "जयपुर", "जोधपुर", "अजमेर"], a: 1 },
    { q: "सिखों का प्रमुख त्योहार कौन सा है?", o: ["होली", "बैसाखी", "दीवाली", "लोहड़ी"], a: 1 },
    { q: "लौह पुरुष किस महापुरुष को कहा जाता है?", o: ["गांधी", "सरदार पटेल", "भगत सिंह", "नेहरू"], a: 1 },
    { q: "नेताजी किस महापुरुष को कहा जाता है?", o: ["गांधी", "सुभाष चंद्र बोस", "आजाद", "सावरकर"], a: 1 },
    { q: "दिल्ली स्थित लाल बहादुर शास्त्री की समाधि का क्या नाम है?", o: ["राजघाट", "विजय घाट", "शक्ति स्थल", "वीर भूमि"], a: 1 },
    { q: "महाभारत के रचयिता कौन हैं?", o: ["वाल्मीकि", "वेदव्यास", "तुलसीदास", "कालिदास"], a: 1 },
    { q: "अर्थशास्त्र नामक पुस्तक किसने लिखी?", o: ["चाणक्य (कौटिल्य)", "मेगस्थनीज", "फाह्यान", "अरस्तु"], a: 0 },
    { q: "जय जवान जय किसान का नारा किसने दिया?", o: ["गांधी", "लाल बहादुर शास्त्री", "भगत सिंह", "नेहरू"], a: 1 },
    { q: "विश्व रेडक्रॉस दिवस किस तारीख को मनाया जाता है?", o: ["5 मई", "8 मई", "10 मई", "15 मई"], a: 1 },
    { q: "सूर्योदय का देश के नाम से कौन सा देश प्रसिद्ध है?", o: ["भारत", "जापान", "चीन", "रूस"], a: 1 },
    { q: "अंतर्राष्ट्रीय महिला दिवस किस तिथि को मनाया जाता है?", o: ["1 मार्च", "8 मार्च", "15 मार्च", "20 मार्च"], a: 1 },
    { q: "क्षेत्रफल की दृष्टि से भारत में सबसे छोटा राज्य कौन सा है?", o: ["सिक्किम", "गोवा", "त्रिपुरा", "मिजोरम"], a: 1 },
    { q: "ओणम किस राज्य का प्रसिद्ध त्योहार है?", o: ["केरल", "तमिलनाडु", "असोम", "कर्नाटक"], a: 0 },
    { q: "दिल्ली भारत की राजधानी कब बनी?", o: ["1911", "1912", "1947", "1950"], a: 0 },
    { q: "सबसे चमकीला ग्रह कौन सा है?", o: ["बुध", "शुक्र", "मंगल", "शनि"], a: 1 },
    { q: "भारत का राष्ट्रीय पशु कौन सा है?", o: ["शेर", "बाघ", "हाथी", "चीता"], a: 1 },
    { q: "भारत का राष्ट्रीय पक्षी कौन सा है?", o: ["तोता", "मुरग", "मोर", "कोयल"], a: 2 },
    { q: "भारत का राष्ट्रीय जलीय जीव कौन सा है?", o: ["मछली", "कछुआ", "गंगा डॉल्फिन", "मगरमच्छ"], a: 2 },
    { q: "भारत का राष्ट्रीय फल कौन सा है?", o: ["केला", "आम", "सेब", "अंगूर"], a: 1 },
    { q: "भारत का राष्ट्रीय फूल कौन सा है?", o: ["गुलाब", "कमल", "सूरजमुखी", "गेंदा"], a: 1 },
    { q: "भारत का राष्ट्रीय पेड़ कौन सा है?", o: ["नीम", "बरगद", "पीपल", "आम"], a: 1 },
    { q: "भारत का राष्ट्रीय खेल कौन सा है?", o: ["क्रिकेट", "फुटबॉल", "हॉकी", "कबड्डी"], a: 2 }
];

const engine = document.getElementById('quiz-engine');
const picks = new Array(mcqs.length).fill(null);

function init() {
    userName = document.getElementById('username').value;
    if(!userName.trim()) { alert("नाम लिखना अनिवार्य है दोस्त!"); return; }
    document.getElementById('start-screen').style.display = 'none';
    document.getElementById('quiz-screen').style.display = 'block';
    render();
    startClock();
}

function render() {
    mcqs.forEach((q, i) => {
        const div = document.createElement('div');
        div.className = 'q-card';
        div.innerHTML = `<div class="q-text">${i+1}. ${q.q}</div>
            <div class="options" id="opt-grp-${i}">
                ${q.o.map((opt, idx) => `<div class="opt" onclick="selectOpt(${i}, ${idx})">${opt}</div>`).join('')}
            </div>`;
        engine.appendChild(div);
    });
}

function selectOpt(qi, oi) {
    picks[qi] = oi;
    const cards = document.querySelectorAll(`#opt-grp-${qi} .opt`);
    cards.forEach(c => c.classList.remove('selected'));
    cards[oi].classList.add('selected');
}

function showResults() {
    clearInterval(timerId);
    let score = 0;
    mcqs.forEach((q, i) => {
        const opts = document.querySelectorAll(`#opt-grp-${i} .opt`);
        opts[q.a].classList.add('correct');
        if(picks[i] !== null) {
            if(picks[i] === q.a) score++;
            else opts[picks[i]].classList.add('wrong');
        }
    });
    document.getElementById('submit-btn').style.display = 'none';
    const res = document.getElementById('result');
    res.style.display = 'block';
    res.innerHTML = `शानदार ${userName}!<br>आपका स्कोर: ${score} / ${mcqs.length}`;
    window.scrollTo(0,0);
}

let time = 600;
let timerId;
function startClock() {
    timerId = setInterval(() => {
        time--;
        let m = Math.floor(time/60);
        let s = time%60;
        document.getElementById('timer-box').innerText = `समय शेष: ${m}:${s < 10 ? '0'+s : s}`;
        if(time <= 0) { clearInterval(timerId); showResults(); }
    }, 1000);
}
</script>
</body>
</html>
