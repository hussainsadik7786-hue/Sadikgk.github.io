<!DOCTYPE html>
<html>
<head>
<title>MCQ Test</title>

<style>

body{
font-family: Arial;
background:#f2f2f2;
padding:20px;
}

.container{
background:white;
padding:20px;
border-radius:10px;
max-width:800px;
margin:auto;
}

.question{
margin-bottom:20px;
padding:10px;
border-bottom:1px solid #ddd;
}

.correct{
color:green;
font-weight:bold;
}

.wrong{
color:red;
font-weight:bold;
}

#timer{
font-size:22px;
color:red;
font-weight:bold;
text-align:right;
}

button{
padding:10px 20px;
font-size:16px;
cursor:pointer;
}

</style>

</head>

<body>

<div class="container">

<h2>MCQ Test</h2>

<div id="timer">15:00</div>

<form id="quizForm">

<div class="question">
<p>1. भारत की राजधानी क्या है?</p>
<label><input type="radio" name="q1" value="wrong"> मुंबई</label><br>
<label><input type="radio" name="q1" value="correct"> दिल्ली</label><br>
<label><input type="radio" name="q1" value="wrong"> कोलकाता</label><br>
<label><input type="radio" name="q1" value="wrong"> चेन्नई</label>
</div>

<div class="question">
<p>2. भारत का राष्ट्रीय पशु कौन है?</p>
<label><input type="radio" name="q2" value="correct"> बाघ</label><br>
<label><input type="radio" name="q2" value="wrong"> शेर</label><br>
<label><input type="radio" name="q2" value="wrong"> हाथी</label><br>
<label><input type="radio" name="q2" value="wrong"> घोड़ा</label>
</div>

<div class="question">
<p>3. 2 + 2 = ?</p>
<label><input type="radio" name="q3" value="wrong"> 3</label><br>
<label><input type="radio" name="q3" value="correct"> 4</label><br>
<label><input type="radio" name="q3" value="wrong"> 5</label><br>
<label><input type="radio" name="q3" value="wrong"> 6</label>
</div>

<div class="question">
<p>4. पृथ्वी का उपग्रह कौन है?</p>
<label><input type="radio" name="q4" value="wrong"> मंगल</label><br>
<label><input type="radio" name="q4" value="correct"> चंद्रमा</label><br>
<label><input type="radio" name="q4" value="wrong"> शुक्र</label><br>
<label><input type="radio" name="q4" value="wrong"> बुध</label>
</div>

<div class="question">
<p>5. भारत का राष्ट्रीय पक्षी कौन है?</p>
<label><input type="radio" name="q5" value="wrong"> तोता</label><br>
<label><input type="radio" name="q5" value="correct"> मोर</label><br>
<label><input type="radio" name="q5" value="wrong"> कबूतर</label><br>
<label><input type="radio" name="q5" value="wrong"> बाज</label>
</div>

<div class="question">
<p>6. 5 × 5 = ?</p>
<label><input type="radio" name="q6" value="wrong"> 20</label><br>
<label><input type="radio" name="q6" value="correct"> 25</label><br>
<label><input type="radio" name="q6" value="wrong"> 15</label><br>
<label><input type="radio" name="q6" value="wrong"> 10</label>
</div>

<div class="question">
<p>7. भारत का राष्ट्रीय फूल कौन है?</p>
<label><input type="radio" name="q7" value="correct"> कमल</label><br>
<label><input type="radio" name="q7" value="wrong"> गुलाब</label><br>
<label><input type="radio" name="q7" value="wrong"> सूरजमुखी</label><br>
<label><input type="radio" name="q7" value="wrong"> चमेली</label>
</div>

<div class="question">
<p>8. 10 ÷ 2 = ?</p>
<label><input type="radio" name="q8" value="correct"> 5</label><br>
<label><input type="radio" name="q8" value="wrong"> 4</label><br>
<label><input type="radio" name="q8" value="wrong"> 6</label><br>
<label><input type="radio" name="q8" value="wrong"> 3</label>
</div>

<div class="question">
<p>9. भारत का राष्ट्रीय खेल क्या है?</p>
<label><input type="radio" name="q9" value="correct"> हॉकी</label><br>
<label><input type="radio" name="q9" value="wrong"> क्रिकेट</label><br>
<label><input type="radio" name="q9" value="wrong"> फुटबॉल</label><br>
<label><input type="radio" name="q9" value="wrong"> कबड्डी</label>
</div>

<div class="question">
<p>10. 3 × 3 = ?</p>
<label><input type="radio" name="q10" value="wrong"> 6</label><br>
<label><input type="radio" name="q10" value="wrong"> 7</label><br>
<label><input type="radio" name="q10" value="correct"> 9</label><br>
<label><input type="radio" name="q10" value="wrong"> 8</label>
</div>

<br>

<button type="button" onclick="submitQuiz()">Submit</button>

</form>

<h2 id="result"></h2>

</div>

<script>

let time = 900;

let timer = setInterval(function(){

time--;

let min = Math.floor(time/60);
let sec = time%60;

document.getElementById("timer").innerHTML =
(min<10?"0":"")+min + ":" + (sec<10?"0":"")+sec;

if(time<=0){
clearInterval(timer);
submitQuiz();
}

},1000);

function submitQuiz(){

clearInterval(timer);

let score = 0;

let answers = document.querySelectorAll("input[type=radio]:checked");

answers.forEach(function(ans){

if(ans.value=="correct"){
score++;
ans.parentElement.classList.add("correct");
}else{
ans.parentElement.classList.add("wrong");
}

});

document.getElementById("result").innerHTML =
"Score : "+score;

}

</script>

</body>
</html>
