<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SADIK RRB/BSSC Quiz Engine</title>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; background-color: #e9ecef; padding: 10px; }
        .container { max-width: 900px; margin: auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 20px rgba(0,0,0,0.15); }
        .hidden { display: none; }
        #header-tools { position: sticky; top: 0; background: white; padding: 10px; border-bottom: 2px solid #28a745; z-index: 100; display: flex; justify-content: space-between; align-items: center; }
        #timer { font-size: 22px; font-weight: bold; color: #dc3545; }
        .question-card { margin-bottom: 25px; padding: 15px; border-left: 5px solid #007bff; background: #f8f9fa; border-radius: 5px; }
        .options-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px; }
        label { cursor: pointer; padding: 8px; border-radius: 4px; transition: 0.3s; display: block; }
        label:hover { background: #dee2e6; }
        .correct-ans { background-color: #28a745 !important; color: white !important; }
        .wrong-ans { background-color: #dc3545 !important; color: white !important; }
        button { background: #28a745; color: white; border: none; padding: 12px 25px; cursor: pointer; border-radius: 5px; font-size: 16px; width: 100%; }
        #result-box { text-align: center; border: 3px solid #28a745; border-radius: 10px; padding: 20px; margin-top: 20px; }
        input[type="text"] { width: 100%; padding: 12px; margin: 15px 0; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }
    </style>
</head>
<body>

<div class="container">
    <div id="login-box">
        <h1 style="color:#28a745; text-align:center;">SADIK STUDY CENTER</h1>
        <h3 style="text-align:center;">RRB & Bihar SSC Practice Test</h3>
        <p>Aapna Naam Enter Karein:</p>
        <input type="text" id="username" placeholder="Full Name Yahan Likhein...">
        <button onclick="startQuiz()">Start 101 Questions Test (20 Min)</button>
    </div>

    <div id="quiz-box" class="hidden">
        <div id="header-tools">
            <div id="user-display" style="font-weight:bold;"></div>
            <div id="timer">Time: <span id="time">20:00</span></div>
        </div>
        
        <div id="questions-area">
            </div>

        <button id="submit-btn" onclick="submitQuiz()" style="margin-top:20px; background:#007bff;">Finish & Submit Test</button>
    </div>

    <div id="result-box" class="hidden">
        <h2 id="greet-user"></h2>
        <h1 id="score-display" style="font-size: 50px; color:#28a745;"></h1>
        <p id="summary-text"></p>
        <button onclick="location.reload()" style="background:#6c757d;">Retake Test</button>
    </div>
</div>

<script>
    // Answer Key Mapping (Based on your provided image and previous list)
    const masterKeys = {
        1:"A", 2:"C", 3:"D", 4:"D", 5:"C", 6:"A", 7:"B", 8:"C", 9:"A", 10:"A",
        11:"D", 12:"A", 13:"A", 14:"A", 15:"C", 16:"A", 17:"B", 18:"C", 19:"D", 20:"D",
        21:"D", 22:"A", 23:"D", 24:"B", 25:"A", 26:"C", 27:"C", 28:"D", 29:"D", 30:"A",
        31:"D", 32:"B", 33:"A", 34:"D", 35:"D", 36:"A", 37:"A", 38:"A", 39:"C", 40:"C",
        41:"B", 42:"C", 43:"D", 44:"B", 45:"C", 46:"C", 47:"C", 48:"B", 49:"C", 50:"B",
        51:"C", 52:"C", 53:"C", 54:"C", 55:"C", 56:"C", 57:"C", 58:"B", 59:"C", 60:"C",
        61:"B", 62:"C", 63:"C", 64:"C", 65:"C", 66:"C", 67:"C", 68:"C", 69:"C", 70:"C",
        71:"B", 72:"C", 73:"C", 74:"B", 75:"B", 76:"D", 77:"B", 78:"B", 79:"A", 80:"B",
        81:"C", 82:"C", 83:"C", 84:"C", 85:"B", 86:"C", 87:"A", 88:"C", 89:"C", 90:"D",
        91:"B", 92:"C", 93:"C", 94:"B", 95:"B", 96:"B", 97:"C", 98:"C", 99:"C", 100:"B", 101:"B"
    };

    // Sirf sample ke liye kuch questions text likhe hain, baki aapne jo image di hai wo key mein mapped hai
    const questionsData = [
        {id: 1, q: "निम्न में से कौन सोयाबीन उत्पादन में अग्रणी राज्य है?", a: "मध्य प्रदेश", b: "उत्तर प्रदेश", c: "गोवा", d: "बिहार"},
        {id: 86, q: "भारत के कुल बोये गए क्षेत्र का कितना प्रतिशत दालों के अधीन है?", a: "9%", b: "10.5%", c: "11%", d: "12%"},
        {id: 88, q: "अरहर (तुर) को और किस नाम से जाना जाता है?", a: "पीला मक्का", b: "सफेद चना", c: "लाल चना और पिजन पी", d: "रबी मक्का"},
        {id: 100, q: "चाय की पत्तियों में कौन-कौन से तत्व प्रचुर मात्रा में पाए जाते हैं?", a: "निकोटीन और कैफीन", b: "कैफीन और टेनिन", c: "टेनिन और फ्लोरिन", d: "टेनिन और प्रोटीन"}
        // Note: Yahan aap baaki 101 questions ka text manually add kar sakte hain.
    ];

    let timeLeft = 20 * 60;
    let timerId;

    function startQuiz() {
        const name = document.getElementById('username').value;
        if(!name) return alert("Naam likhna zaroori hai!");
        
        document.getElementById('login-box').classList.add('hidden');
        document.getElementById('quiz-box').classList.remove('hidden');
        document.getElementById('user-display').innerText = "Student: " + name;
        
        loadQuestions();
        startTimer();
    }

    function loadQuestions() {
        const container = document.getElementById('questions-area');
        // Logic to generate 101 question slots
        for(let i=1; i<=101; i++) {
            let qText = questionsData.find(x => x.id === i)?.q || "Question " + i + " (Check Image/Notes for text)";
            container.innerHTML += `
                <div class="question-card" id="card-${i}">
                    <p><strong>Q${i}. ${qText}</strong></p>
                    <div class="options-grid">
                        <label id="L-${i}-A"><input type="radio" name="q${i}" value="A"> (A)</label>
                        <label id="L-${i}-B"><input type="radio" name="q${i}" value="B"> (B)</label>
                        <label id="L-${i}-C"><input type="radio" name="q${i}" value="C"> (C)</label>
                        <label id="L-${i}-D"><input type="radio" name="q${i}" value="D"> (D)</label>
                    </div>
                </div>
            `;
        }
    }

    function startTimer() {
        timerId = setInterval(() => {
            timeLeft--;
            let min = Math.floor(timeLeft/60);
            let sec = timeLeft%60;
            document.getElementById('time').innerText = `${min}:${sec < 10 ? '0'+sec : sec}`;
            if(timeLeft <= 0) submitQuiz();
        }, 1000);
    }

    function submitQuiz() {
        clearInterval(timerId);
        let score = 0;
        
        for(let i=1; i<=101; i++) {
            const selected = document.querySelector(`input[name="q${i}"]:checked`);
            const correctVal = masterKeys[i];
            
            // Highlight Correct Answer Always
            document.getElementById(`L-${i}-${correctVal}`).classList.add('correct-ans');
            
            if(selected) {
                if(selected.value === correctVal) {
                    score++;
                } else {
                    document.getElementById(`L-${i}-${selected.value}`).classList.add('wrong-ans');
                }
            }
        }

        document.getElementById('quiz-box').classList.add('hidden');
        document.getElementById('result-box').classList.remove('hidden');
        document.getElementById('greet-user').innerText = "Shabash " + document.getElementById('username').value + "!";
        document.getElementById('score-display').innerText = score + " / 101";
        window.scrollTo(0,0);
    }
</script>
</body>
</html>
