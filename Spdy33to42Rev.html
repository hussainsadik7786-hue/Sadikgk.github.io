<!DOCTYPE html>

<head>
    <meta charset="UTF-8">

    <title>GK with Sadik - Mega Revision 100</title>
    <style>
        body { font-family: 'Arial', sans-serif; background-color: #f4f4f9; margin: 0; padding: 10px; }
        .container { max-width: 900px; margin: auto; background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); position: relative; }
        
        #timer-box { position: sticky; top: 0; z-index: 100; background: #d32f2f; color: white; padding: 15px; text-align: center; font-size: 24px; font-weight: bold; border-radius: 10px; margin-bottom: 20px; }

        .q-card { position: relative; border-bottom: 2px solid #eee; padding: 25px 0; overflow: hidden; }
        
        /* Sadik Red Watermark */
        .q-card::before {
            content: "Sadik";
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%) rotate(-30deg);
            font-size: 100px;
            color: rgba(211, 47, 47, 0.04);
            font-weight: 900;
            pointer-events: none;
            z-index: 0;
        }

        .q-text { position: relative; z-index: 1; font-size: 19px; font-weight: bold; color: #333; }
        .options { position: relative; z-index: 1; display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }
        .opt { padding: 12px; border: 1px solid #ccc; border-radius: 8px; cursor: pointer; background: #fff; transition: 0.3s; text-align: center; }
        .opt:hover { background: #fdf2f2; }
        
        .selected { border-color: #d32f2f; background: #ffebee; font-weight: bold; }
        .correct { background: #c8e6c9 !important; border-color: #388e3c !important; color: #1b5e20; }
        .wrong { background: #ffcdd2 !important; border-color: #d32f2f !important; color: #b71c1c; }

        .submit-btn { width: 100%; padding: 20px; background: #d32f2f; color: white; border: none; border-radius: 10px; font-size: 22px; font-weight: bold; cursor: pointer; margin-top: 30px; }
        #result { display: none; text-align: center; padding: 30px; border: 4px solid #d32f2f; border-radius: 15px; margin-bottom: 25px; background: #fff; }
        
        #start-screen { text-align: center; padding: 100px 20px; }
        .name-input { padding: 15px; width: 80%; font-size: 20px; border: 2px solid #d32f2f; border-radius: 10px; margin-bottom: 30px; }
    </style>
</head>

    { q: "गांधी जी का जन्म कब हुआ था?", o: ["1860", "1869", "1879", "1889"], a: 1 },
    { q: "संविधान सभा के स्थायी अध्यक्ष?", o: ["अम्बेडकर", "डॉ. राजेन्द्र प्रसाद", "नेहरू", "सिन्हा"], a: 1 },
    { q: "भारत का राष्ट्रीय खेल?", o: ["क्रिकेट", "हॉकी", "फुटबॉल", "कबड्डी"], a: 1 },
    { q: "काजीरंगा नेशनल पार्क कहाँ है?", o: ["बिहार", "असोम", "केरल", "गुजरात"], a: 1 },
    { q: "मसालों का बगीचा किसे कहते हैं?", o: ["तमिलनाडु", "केरल", "कर्नाटक", "ओडिशा"], a: 1 },
    { q: "भारत की सबसे लम्बी नदी?", o: ["यमुना", "गंगा", "गोदावरी", "सिंधु"], a: 1 },
    { q: "विश्व जल दिवस कब मनाया जाता है?", o: ["20 मार्च", "22 मार्च", "25 मार्च", "30 मार्च"], a: 1 },
    { q: "डिस्कवरी ऑफ इंडिया के लेखक?", o: ["गांधी", "नेहरू", "आज़ाद", "तिलक"], a: 1 },
    { q: "विटामिन B1 की कमी से रोग?", o: ["रतौंधी", "बेरी-बेरी", "स्कर्वी", "रिकेट्स"], a: 1 },
    { q: "आग बुझाने के लिए कौन सी गैस?", o: ["O2", "CO2", "N2", "H2"], a: 1 },
    { q: "सौर मंडल का सबसे बड़ा ग्रह?", o: ["पृथ्वी", "बृहस्पति", "शनि", "मंगल"], a: 1 },
    { q: "जोग जलप्रपात किस नदी पर है?", o: ["कृष्णा", "शरावती", "कावेरी", "नर्मदा"], a: 1 },
    { q: "सबसे कठोर पदार्थ कौन सा है?", o: ["सोना", "हीरा", "लोहा", "प्लेटिनम"], a: 1 },
    { q: "भारत का प्रथम नागरिक कौन होता है?", o: ["PM", "राष्ट्रपति", "CJI", "राज्यपाल"], a: 1 },
    { q: "विश्व जनसंख्या दिवस?", o: ["1 जुलाई", "11 जुलाई", "21 जुलाई", "31 जुलाई"], a: 1 },
    { q: "चाय के लिए सबसे अच्छी मिट्टी?", o: ["जलोढ़", "लैटेराइट", "काली", "लाल"], a: 1 },
    { q: "दूध की शुद्धता किससे मापते हैं?", o: ["बैरोमीटर", "लैक्टोमीटर", "हाइग्रोमीटर", "थर्मामीटर"], a: 1 },
    { q: "लोकसभा का कार्यकाल कितना होता है?", o: ["4 वर्ष", "5 वर्ष", "6 वर्ष", "अनिश्चित"], a: 1 }
];

const qContainer = document.getElementById('questions-container');
const userMarks = new Array(megaData.length).fill(null);

function startQuiz() {
    userName = document.getElementById('user-name').value;
    if(!userName.trim()) { alert("सादिक भाई, नाम के बिना रिजल्ट कैसे आएगा?"); return; }
    document.getElementById('start-screen').style.display = 'none';
    document.getElementById('quiz-screen').style.display = 'block';
    renderQuestions();
    runMegaTimer();
}

function renderQuestions() {
    megaData.forEach((item, i) => {
        const d = document.createElement('div');
        d.className = 'q-card';
        d.innerHTML = `<div class="q-text">${i+1}. ${item.q}</div>
            <div class="options" id="grp-${i}">
                ${item.o.map((o, idx) => `<div class="opt" onclick="mark(${i}, ${idx})">${o}</div>`).join('')}
            </div>`;
        qContainer.appendChild(d);
    });
}

function mark(qi, oi) {
    userMarks[qi] = oi;
    const btns = document.querySelectorAll(`#grp-${qi} .opt`);
    btns.forEach(b => b.classList.remove('selected'));
    btns[oi].classList.add('selected');
}

function calculateScore() {
    clearInterval(timerId);
    let finalPoints = 0;
    megaData.forEach((item, i) => {
        const opts = document.querySelectorAll(`#grp-${i} .opt`);
        opts[item.a].classList.add('correct');
        if(userMarks[i] !== null) {
            if(userMarks[i] === item.a) finalPoints++;
            else opts[userMarks[i]].classList.add('wrong');
        }
    });
    document.getElementById('final-submit').style.display = 'none';
    const res = document.getElementById('result');
    res.style.display = 'block';
    res.innerHTML = `<h2>बधाई हो ${userName}!</h2><h3>आपका फाइनल स्कोर: ${finalPoints} / ${megaData.length}</h3>`;
    window.scrollTo(0,0);
}

let timeLimit = 1800;
let timerId;
function runMegaTimer() {
    timerId = setInterval(() => {
        timeLimit--;
        let m = Math.floor(timeLimit/60);
        let s = timeLimit%60;
        document.getElementById('timer-box').innerText = `समय शेष: ${m}:${s < 10 ? '0'+s : s}`;
        if(timeLimit <= 0) calculateScore();
    }, 1000);
}
</script>
