    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f0f2f5; margin: 0; padding: 10px; }
        .main-card { max-width: 900px; margin: auto; background: white; padding: 25px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); position: relative; }
        
        #timer-display { position: sticky; top: 10px; z-index: 1000; background: #e74c3c; color: white; padding: 15px; text-align: center; font-size: 24px; font-weight: bold; border-radius: 12px; margin-bottom: 25px; box-shadow: 0 5px 15px rgba(231, 76, 60, 0.3); }

        .question-wrap { position: relative; border-bottom: 1px solid #eee; padding: 30px 0; overflow: hidden; }
        
        /* Sadik Red Watermark - Invisible but present */
        .question-wrap::after {
            content: "Sadik";
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%) rotate(-25deg);
            font-size: 90px;
            color: rgba(231, 76, 60, 0.04);
            font-weight: 900;
            pointer-events: none;
        }

        .question-title { position: relative; z-index: 2; font-size: 20px; font-weight: 700; color: #1a1a1a; line-height: 1.5; margin-bottom: 15px; }
        .options-container { position: relative; z-index: 2; display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .opt-box { padding: 14px; border: 2px solid #edeff2; border-radius: 10px; cursor: pointer; background: #f8f9fa; transition: all 0.2s; font-size: 16px; text-align: center; }
        .opt-box:hover { background: #fff5f5; border-color: #e74c3c; }
        
        .is-selected { border-color: #e74c3c; background: #fff5f5; font-weight: bold; transform: scale(1.02); }
        .is-right { background: #2ecc71 !important; border-color: #27ae60 !important; color: white; }
        .is-wrong { background: #e74c3c !important; border-color: #c0392b !important; color: white; }

        .btn-submit { width: 100%; padding: 22px; background: #2c3e50; color: white; border: none; border-radius: 12px; font-size: 22px; font-weight: bold; cursor: pointer; margin-top: 40px; transition: 0.3s; }
        .btn-submit:hover { background: #1a252f; }
        
        #final-score-card { display: none; text-align: center; padding: 40px; border: 5px double #e74c3c; border-radius: 20px; background: #fff; margin-bottom: 30px; }
        
        #welcome-screen { text-align: center; padding: 100px 20px; }
        .input-style { padding: 18px; width: 85%; font-size: 20px; border: 2px solid #ccc; border-radius: 12px; margin-bottom: 30px; outline: none; transition: 0.3s; }
        .input-style:focus { border-color: #e74c3c; }
    </style>
</head>

function initTest() {
    sName = document.getElementById('student-name').value;
    if(!sName.trim()) { alert("सादिक भाई, नाम लिखना अनिवार्य है!"); return; }
    document.getElementById('welcome-screen').style.display = 'none';
    document.getElementById('test-screen').style.display = 'block';
    renderAll();
    timerStart();
}

function renderAll() {
    rawData.forEach((item, i) => {
        const wrap = document.createElement('div');
        wrap.className = 'question-wrap';
        wrap.innerHTML = `<div class="question-title">${i+1}. ${item.q}</div>
            <div class="options-container" id="grp-${i}">
                ${item.o.map((val, idx) => `<div class="opt-box" onclick="pickItem(${i}, ${idx})">${val}</div>`).join('')}
            </div>`;
        listArea.appendChild(wrap);
    });
}

function pickItem(qi, oi) {
    choiceTracker[qi] = oi;
    const allBtns = document.querySelectorAll(`#grp-${qi} .opt-box`);
    allBtns.forEach(b => b.classList.remove('is-selected'));
    allBtns[oi].classList.add('is-selected');
}

function checkAll() {
    clearInterval(clockRef);
    let finalMark = 0;
    rawData.forEach((item, i) => {
        const boxes = document.querySelectorAll(`#grp-${i} .opt-box`);
        boxes[item.a].classList.add('is-right');
        if(choiceTracker[i] !== null) {
            if(choiceTracker[i] === item.a) finalMark++;
            else boxes[choiceTracker[i]].classList.add('is-wrong');
        }
    });
    document.getElementById('btn-done').style.display = 'none';
    const report = document.getElementById('final-score-card');
    report.style.display = 'block';
    report.innerHTML = `<h2 style="color:#e74c3c;">रिजल्ट: ${sName}</h2><h1 style="font-size:48px;">${finalMark} / 100</h1><p>पेज 33-42 का रिवीजन सफल रहा!</p>`;
    window.scrollTo(0,0);
}

let secLeft = 1800;
let clockRef;
function timerStart() {
    clockRef = setInterval(() => {
        secLeft--;
        let mm = Math.floor(secLeft/60);
        let ss = secLeft%60;
        document.getElementById('timer-display').innerText = `समय शेष: ${mm}:${ss < 10 ? '0'+ss : ss}`;
        if(secLeft <= 0) checkAll();
    }, 1000);
}
</script>
