questions.forEach((q,i)=>{

let div=document.createElement("div");
div.className="question";

let html="<p>"+(i+1)+". "+q[0]+"</p>";

q[1].forEach((opt,j)=>{

html+=`<label>
<input type="radio" name="q${i}" value="${j}"> ${opt}
</label><br>`;

});

div.innerHTML=html;
form.appendChild(div);

});

</script>

<br>
<button type="button" onclick="submitTest()">Submit Test</button>

</form>

<h2 id="result"></h2>

</div>

</div>

<script>

let time=1800;

function startTest(){

let name=document.getElementById("username").value;

if(name==""){
alert("Please enter name");
return;
}

document.getElementById("startPage").style.display="none";
document.getElementById("testPage").style.display="block";

startTimer();

}

function startTimer(){

let timer=setInterval(function(){

time--;

let min=Math.floor(time/60);
let sec=time%60;

document.getElementById("timer").innerHTML=min+":"+sec;

if(time<=0){
clearInterval(timer);
submitTest();
}

},1000);

}

function submitTest(){

let score=0;

let answers=document.querySelectorAll("input[type=radio]:checked");

answers.forEach((ans,i)=>{

let qIndex=ans.name.replace("q","");
let correct=questions[qIndex][2];

if(ans.value==correct){
score++;
ans.parentElement.classList.add("correct");
}else{
ans.parentElement.classList.add("wrong");
}

});

document.getElementById("result").innerHTML="Score : "+score+" / 50";

}

</script>
