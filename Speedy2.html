<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Railway Quiz - Page 34</title>
    <style>
        body { font-family: 'Arial', sans-serif; background-color: #f4f7f6; padding: 20px; }
        .container { max-width: 850px; margin: auto; background: white; padding: 25px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        #timer-box { position: sticky; top: 10px; z-index: 1000; background: #d93025; color: white; padding: 10px; text-align: center; font-size: 22px; font-weight: bold; border-radius: 8px; margin-bottom: 20px; }
        .question-card { position: relative; background: #fff; border: 1px solid #ddd; padding: 20px; margin-bottom: 25px; border-radius: 10px; overflow: hidden; }
        
        /* वॉटरमार्क - यह Sadik ही रहेगा जैसा आपने माँगा था */
        .question-card::before { content: "Sadik"; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%) rotate(-30deg); font-size: 70px; color: rgba(0, 0, 0, 0.04); font-weight: bold; pointer-events: none; z-index: 0; }
        
        .q-text { position: relative; z-index: 1; font-size: 18px; font-weight: bold; color: #333; }
        .options-list { position: relative; z-index: 1; list-style: none; padding: 0; margin-top: 10px; }
        .options-list li { background: rgba(255, 255, 255, 0.8); border: 1px solid #ccc; padding: 12px; margin: 8px 0; border-radius: 6px; cursor: pointer; }
        .selected { border: 2px solid #1a73e8 !important; background: #e8f0fe !important; }
        .correct { background: #d4edda !important; border-color: #28a745 !important; color: #155724; }
        .wrong { background: #f8d7da !important; border-color: #dc3545 !important; color: #721c24; }
        #submit-btn { width: 100%; padding: 15px; background: #1a73e8; color: white; border: none; border-radius: 8px; font-size: 20px; font-weight: bold; cursor: pointer; }
        #result-display { display: none; text-align: center; padding: 20px; font-size: 26px; color: #1a73e8; border: 3px dashed #1a73e8; margin-bottom: 20px; border-radius: 10px; }
        #name-screen { text-align: center; padding: 50px; }
        #user-name-input { padding: 10px; font-size: 18px; width: 250px; border-radius: 5px; border: 1px solid #ccc; }
    </style>
</head>
<body>

<div class="container" id="quiz-main" style="display:none;">
    <h1 style="text-align: center;">रेलवे सामान्य अध्ययन (पेज-34)</h1>
    <div id="timer-box">समय शेष: 10:00</div>
    <div id="result-display"></div>
    <div id="quiz-wrap"></div>
    <button id="submit-btn" onclick="processResult()">टेस्ट सबमिट करें</button>
</div>

<div class="container" id="name-screen">
    <h2>अपना नाम दर्ज करें</h2>
    <input type="text" id="user-name-input" placeholder="यहाँ नाम लिखें...">
    <br><br>
    <button id="submit-btn" style="width: auto; padding: 10px 30px;" onclick="startQuiz()">टेस्ट शुरू करें</button>
</div>

<script>
let userName = "";
const quizSource = [
    { q: "भारत में अंतरिक्ष आयोग एवं अंतरिक्ष विभाग की स्थापना कब हुई?", o: ["1962", "1969", "1972", "1975"], a: 2 },
    { q: "जगन्नाथ मंदिर (पूरी) को किस वंश के शासकों ने बनवाया?", o: ["गंग वंश", "चोल वंश", "गुप्त वंश", "मौर्य वंश"], a: 0 },
    { q: "बांग्लादेश में गंगा नदी को क्या कहा जाता है?", o: ["जमुना", "मेघना", "पद्मा", "ब्रह्मपुत्र"], a: 2 },
    { q: "महाभारत का प्राचीन नाम क्या है?", o: ["भारत कथा", "जय संहिता", "विजय", "पुराण"], a: 1 },
    { q: "सबसे प्राचीन वेद कौन सा है?", o: ["सामवेद", "ऋग्वेद", "यजुर्वेद", "अथर्ववेद"], a: 1 },
    { q: "हजामती दर्पण के रूप में किसका प्रयोग होता है?", o: ["उत्तल", "अवतल", "समतल", "कोई नहीं"], a: 1 },
    { q: "तानसेन का असली नाम क्या था?", o: ["महेश दास", "रामतनु पाण्डे", "मकरंद पाण्डे", "बीरबल"], a: 1 },
    { q: "खजुराहो मंदिर लगभग कितने वर्ष पुराना है?", o: ["500", "800", "1000", "1500"], a: 2 },
    { q: "हाथी गुम्फा (ओडिशा) किस राजा ने बनवाया?", o: ["अशोक", "खारवेल", "हर्ष", "कनिष्क"], a: 1 },
    { q: "गोकक झरना कहाँ स्थित है?", o: ["बेलगाँव (कर्नाटक)", "जबलपुर", "मैसूर", "रांची"], a: 0 },
    { q: "अम्लीय वर्षा का मुख्य कारण क्या है?", o: ["CO2", "SO2 और NO2", "CH4", "O3"], a: 1 },
    { q: "भारत की प्रथम युद्धक मिसाइल कौन सी है?", o: ["आकाश", "पृथ्वी", "अग्नि", "नाग"], a: 1 },
    { q: "ट्रांजिस्टर का आविष्कार कब हुआ?", o: ["1945", "1948", "1950", "1955"], a: 1 },
    { q: "अकबर का राजस्व मंत्री कौन था?", o: ["बीरबल", "टोडरमल", "मानसिंह", "अबुल फजल"], a: 1 },
    { q: "पृथ्वी का ध्रुवीय व्यास कितने किमी है?", o: ["12,756", "12,714", "13,000", "12,500"], a: 1 },
    { q: "लोहे का निष्कर्षण किससे होता है?", o: ["हेमेटाइट", "बॉक्साइट", "सिनेबार", "क्यूप्राइट"], a: 0 },
    { q: "देश का सबसे बड़ा बंदरगाह कौन सा है?", o: ["कांडला", "चेन्नई", "मुंबई", "कोलकाता"], a: 2 },
    { q: "14 बैंकों का राष्ट्रीयकरण कब हुआ?", o: ["1969", "1970", "1971", "1972"], a: 0 },
    { q: "ध्वनी को किसमें मापा जाता है?", o: ["हर्ट्ज़", "डेसीबल", "वाट", "जूल"], a: 1 },
    { q: "गांधी जी का जन्म पोरबंदर में कब हुआ?", o: ["1865", "1869", "1872", "1875"], a: 1 },
    { q: "सिनेबार किसका अयस्क है?", o: ["तांबा", "पारा (Mercury)", "लोहा", "सोना"], a: 1 },
    { q: "दिल्ली भारत की राजधानी कब बनी?", o: ["1911", "1912", "1915", "1947"], a: 1 },
    { q: "जापान की करेंसी क्या है?", o: ["डॉलर", "युआन", "येन", "टका"], a: 2 },
    { q: "अभ्रक का सबसे बड़ा उत्पादक देश कौन सा है?", o: ["भारत", "चीन", "अमेरिका", "रूस"], a: 1 },
    { q: "बेसिन की संधि अंग्रेजों ने किसके साथ की थी?", o: ["मराठों", "पेशवा", "निज़ाम", "सिक्ख"], a: 1 },
    { q: "फलों का अध्ययन क्या कहलाता है?", o: ["पोमोलॉजी", "पीसीकल्चर", "सेरीकल्चर", "ओलेरीकल्चर"], a: 0 },
    { q: "दिल्ली चलो का नारा किसने दिया?", o: ["गांधी", "सुभाष चंद्र बोस", "भगत सिंह", "नेहरू"], a: 1 },
    { q: "बिहु किस राज्य का त्योहार है?", o: ["असम", "ओडिशा", "बिहार", "केरल"], a: 0 },
    { q: "भाखड़ा नांगल बाँध किस नदी पर है?", o: ["सतलज", "रावी", "व्यास", "चिनाब"], a: 0 },
    { q: "ध्यानचंद स्टेडियम कहाँ स्थित है?", o: ["दिल्ली", "लखनऊ", "मुंबई", "कानपुर"], a: 1 },
    { q: "टीपू सुल्तान कहाँ का शासक था?", o: ["हैदराबाद", "मैसूर", "बीजापुर", "गोलकुंडा"], a: 1 },
    { q: "नाटो (NATO) का मुख्यालय कहाँ है?", o: ["ब्रुसेल्स", "पेरिस", "लंदन", "न्यूयॉर्क"], a: 0 },
    { q: "बटरफ्लाई शब्द किस खेल से संबंधित है?", o: ["क्रिकेट", "तैराकी", "टेनिस", "हॉकी"], a: 1 },
    { q: "1 अश्व शक्ति कितने वाट की होती है?", o: ["500", "746", "1000", "750"], a: 1 },
    { q: "मोती मस्जिद (आगरा किला) किसने बनवाई?", o: ["अकबर", "शाहजहाँ", "औरंगजेब", "जहाँगीर"], a: 1 },
    { q: "शेरशाह का मकबरा कहाँ है?", o: ["दिल्ली", "सासाराम", "आगरा", "लाहौर"], a: 1 },
    { q: "इंग्लिश चैनल पार करने वाला प्रथम भारतीय?", o: ["मिहिर सेन", "आरती साहा", "लियंडर पेस", "विजेंदर"], a: 0 },
    { q: "एशिया की रोशनी किसे कहा जाता है?", o: ["गांधी", "गौतम बुद्ध", "अकबर", "नेहरू"], a: 1 },
    { q: "बजट शब्द का अर्थ क्या है?", o: ["पैसा", "चमड़े का थैला", "विवरण", "हिसाब"], a: 1 },
    { q: "सार्क (SAARC) का मुख्यालय कहाँ है?", o: ["ढाका", "काठमांडू", "दिल्ली", "कोलंबो"], a: 1 },
    { q: "कच्चे फलों को पकाने के लिए प्रयुक्त गैस?", o: ["एसीटलीन", "मीथेन", "ऑक्सीजन", "नाइट्रोजन"], a: 0 },
    { q: "विद्युत चुम्बक बनाने के लिए प्रयुक्त लोहा?", o: ["कठोर लोहा", "मृदु लोहा", "स्टील", "ढलवां लोहा"], a: 1 },
    { q: "टी (Tea) शब्द किस खेल से संबंधित है?", o: ["गोल्फ", "क्रिकेट", "पोलो", "टेनिस"], a: 0 },
    { q: "माइक्रोफोन का आविष्कारक कौन है?", o: ["एडिसन", "ग्राहम बेल", "न्यूटन", "फैराडे"], a: 1 },
    { q: "साक्षरता दर (तमिलनाडु) कितनी है?", o: ["75.1%", "80.1%", "85.2%", "70%"], a: 1 },
    { q: "तमिलनाडु की प्रमुख भाषा क्या है?", o: ["तेलुगु", "मलयालम", "तमिल", "कन्नड़"], a: 2 },
    { q: "नीलगिरी तहर किस राज्य का राजकीय पशु है?", o: ["केरल", "तमिलनाडु", "कर्नाटक", "ओडिशा"], a: 1 },
    { q: "पोंगल कहाँ का प्रमुख त्योहार है?", o: ["तमिलनाडु", "आंध्र प्रदेश", "केरल", "असम"], a: 0 },
    { q: "मद्रास का नाम बदलकर चेन्नई कब किया गया?", o: ["1990", "1996", "2000", "1985"], a: 1 },
    { q: "संपूर्ण संविधान कब लागू हुआ?", o: ["1947", "1949", "1950", "1952"], a: 2 }
];

const quizWrap = document.getElementById('quiz-wrap');
const selections = new Array(quizSource.length).fill(null);

function startQuiz() {
    userName = document.getElementById('user-name-input').value;
    if (userName.trim() === "") { alert("कृपया अपना नाम लिखें!"); return; }
    document.getElementById('name-screen').style.display = 'none';
    document.getElementById('quiz-main').style.display = 'block';
    drawQuiz();
    startTimer();
}

function drawQuiz() {
    quizSource.forEach((data, i) => {
        const card = document.createElement('div');
        card.className = 'question-card';
        card.innerHTML = `<div class="q-text">${i + 1}. ${data.q}</div>
            <ul class="options-list" id="grp-${i}">
                ${data.o.map((opt, idx) => `<li onclick="pickAnswer(${i}, ${idx})">${opt}</li>`).join('')}
            </ul>`;
        quizWrap.appendChild(card);
    });
}

function pickAnswer(qI, oI) {
    selections[qI] = oI;
    const items = document.querySelectorAll(`#grp-${qI} li`);
    items.forEach(li => li.classList.remove('selected'));
    items[oI].classList.add('selected');
}

function processResult() {
    clearInterval(timerId);
    let points = 0;
    quizSource.forEach((item, i) => {
        const items = document.querySelectorAll(`#grp-${i} li`);
        items[item.a].classList.add('correct');
        if (selections[i] !== null) {
            if (selections[i] === item.a) points++;
            else items[selections[i]].classList.add('wrong');
        }
    });
    document.getElementById('submit-btn').style.display = 'none';
    const res = document.getElementById('result-display');
    res.style.display = 'block';
    res.innerHTML = `बधाई हो ${userName}!<br>आपका स्कोर: ${points} / 50`;
    window.scrollTo(0, 0);
}

let secLeft = 600;
let timerId;
function startTimer() {
    timerId = setInterval(() => {
        secLeft--;
        let m = Math.floor(secLeft / 60);
        let s = secLeft % 60;
        document.getElementById('timer-box').innerText = `समय शेष: ${m}:${s < 10 ? '0' + s : s}`;
        if (secLeft <= 0) { clearInterval(timerId); processResult(); }
    }, 1000);
}
</script>
</body>
</html>
