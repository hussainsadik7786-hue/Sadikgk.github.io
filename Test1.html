<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GK with Sadik - 100 Full Questions</title>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; background-color: #f4f7f6; margin: 0; padding: 10px; }
        .quiz-wrapper { max-width: 950px; margin: auto; background: white; padding: 30px; border-radius: 20px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); position: relative; }
        
        #timer-banner { position: sticky; top: 10px; z-index: 1000; background: #c0392b; color: white; padding: 15px; text-align: center; font-size: 24px; font-weight: bold; border-radius: 12px; margin-bottom: 25px; border: 2px solid #fff; }

        .q-section { position: relative; border-bottom: 2px solid #f0f0f0; padding: 35px 0; }
        
        /* Sadik Red Watermark */
        .q-section::before {
            content: "Sadik";
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%) rotate(-30deg);
            font-size: 110px;
            color: rgba(192, 57, 43, 0.05);
            font-weight: 900;
            pointer-events: none;
        }

        .q-title { position: relative; z-index: 5; font-size: 20px; font-weight: 700; color: #2c3e50; margin-bottom: 20px; line-height: 1.6; }
        .opt-grid { position: relative; z-index: 5; display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .opt-item { padding: 15px; border: 2px solid #dcdde1; border-radius: 12px; cursor: pointer; background: #fff; transition: 0.2s; text-align: center; font-size: 17px; }
        .opt-item:hover { background: #fdf2f2; border-color: #c0392b; }
        
        .active-opt { border-color: #c0392b; background: #fceaea; font-weight: bold; }
        .is-true { background: #27ae60 !important; border-color: #2ecc71 !important; color: white; }
        .is-false { background: #e74c3c !important; border-color: #c0392b !important; color: white; }

        .btn-action { width: 100%; padding: 22px; background: #2c3e50; color: white; border: none; border-radius: 15px; font-size: 22px; font-weight: bold; cursor: pointer; margin-top: 40px; }
        #final-report { display: none; text-align: center; padding: 40px; border: 6px double #c0392b; border-radius: 20px; background: #fff; margin-bottom: 30px; }
        
        #start-box { text-align: center; padding: 120px 20px; }
        .name-box { padding: 20px; width: 80%; font-size: 22px; border: 2px solid #c0392b; border-radius: 12px; margin-bottom: 35px; outline: none; }
    </style>
</head>
<body>

<div class="quiz-wrapper" id="start-box">
    <h1 style="color: #c0392b; font-size: 36px;">Railway Full GK Revision (100 MCQ)</h1>
    <p style="font-size: 20px; color: #7f8c8d;">सादिक भाई, अपनी तैयारी को परखने के लिए अपना नाम लिखें:</p>
    <input type="text" id="user-tag" class="name-box" placeholder="आपका नाम यहाँ...">
    <br>
    <button class="btn-action" style="width: auto; padding: 18px 80px;" onclick="startMegaTest()">टेस्ट शुरू करें</button>
</div>

<div class="quiz-wrapper" id="quiz-box" style="display:none;">
    <div id="timer-banner">समय शेष: 30:00</div>
    <div id="final-report"></div>
    <div id="questions-list"></div>
    <button class="btn-action" id="submit-trigger" onclick="evaluateQuiz()">रिजल्ट देखें</button>
</div>

const mainList = document.getElementById('questions-list');
const tracker = new Array(fullData.length).fill(null);

function startMegaTest() {
    student = document.getElementById('user-tag').value;
    if(!student.trim()) { alert("सादिक भाई, नाम लिखना तो जरूरी है!"); return; }
    document.getElementById('start-box').style.display = 'none';
    document.getElementById('quiz-box').style.display = 'block';
    renderQuiz();
    beginClock();
}

function renderQuiz() {
    fullData.forEach((item, i) => {
        const div = document.createElement('div');
        div.className = 'q-section';
        div.innerHTML = `<div class="q-title">${i+1}. ${item.q}</div>
            <div class="opt-grid" id="ans-${i}">
                ${item.o.map((opt, idx) => `<div class="opt-item" onclick="saveAns(${i}, ${idx})">${opt}</div>`).join('')}
            </div>`;
        mainList.appendChild(div);
    });
}

function saveAns(qi, oi) {
    tracker[qi] = oi;
    const btns = document.querySelectorAll(`#ans-${qi} .opt-item`);
    btns.forEach(b => b.classList.remove('active-opt'));
    btns[oi].classList.add('active-opt');
}

function evaluateQuiz() {
    clearInterval(timerId);
    let correctSum = 0;
    fullData.forEach((item, i) => {
        const options = document.querySelectorAll(`#ans-${i} .opt-item`);
        options[item.a].classList.add('is-true');
        if(tracker[i] !== null) {
            if(tracker[i] === item.a) correctSum++;
            else options[tracker[i]].classList.add('is-false');
        }
    });
    document.getElementById('submit-trigger').style.display = 'none';
    const report = document.getElementById('final-report');
    report.style.display = 'block';
    report.innerHTML = `<h2 style="color:#c0392b;">${student}, आपका स्कोर:</h2><h1 style="font-size:50px;">${correctSum} / 100</h1><p>तैयारी जबरदस्त है, इसे जारी रखें!</p>`;
    window.scrollTo(0,0);
}

let remainingTime = 1800;
let timerId;
function beginClock() {
    timerId = setInterval(() => {
        remainingTime--;
        let mm = Math.floor(remainingTime/60);
        let ss = remainingTime%60;
        document.getElementById('timer-banner').innerText = `समय शेष: ${mm}:${ss < 10 ? '0'+ss : ss}`;
        if(remainingTime <= 0) evaluateQuiz();
    }, 1000);
}
</script>
