<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>भूगोल वस्तुनिष्ठ प्रश्न - 30 मिनट टेस्ट</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f7f6; margin: 0; padding: 20px; }
        .container { max-width: 800px; margin: auto; background: white; padding: 30px; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h1, h2 { text-align: center; color: #2c3e50; }
        .info-panel { display: flex; justify-content: space-between; position: sticky; top: 0; background: #fff; padding: 10px; border-bottom: 2px solid #3498db; z-index: 100; }
        .timer { font-weight: bold; color: #e74c3c; font-size: 1.2em; }
        .question-block { margin-bottom: 25px; padding: 15px; border-bottom: 1px solid #eee; }
        .options label { display: block; margin: 8px 0; cursor: pointer; padding: 5px; border-radius: 4px; }
        .options label:hover { background-color: #f0f0f0; }
        .hidden { display: none; }
        button { background: #3498db; color: white; border: none; padding: 12px 25px; border-radius: 5px; cursor: pointer; font-size: 16px; display: block; margin: 20px auto; }
        button:hover { background: #2980b9; }
        .correct { background-color: #d4edda !important; color: #155724; border: 1px solid #c3e6cb; font-weight: bold; }
        .wrong { background-color: #f8d7da !important; color: #721c24; border: 1px solid #f5c6cb; }
        #resultArea { text-align: center; font-size: 1.5em; margin-top: 20px; color: #27ae60; font-weight: bold; border: 2px solid #27ae60; padding: 15px; border-radius: 8px; }
        input[type="text"] { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }
    </style>
</head>
<body>

<div class="container" id="loginBox">
    <h1>भूगोल वस्तुनिष्ठ प्रश्नोत्तरी</h1>
    <p style="text-align:center;">कुल प्रश्न: 100 | समय: 30 मिनट</p>
    <p>कृपया अपना नाम दर्ज करें और टेस्ट शुरू करें:</p>
    <input type="text" id="userName" placeholder="आपका नाम यहाँ लिखें..." required>
    <button onclick="startQuiz()">टेस्ट शुरू करें</button>
</div>

<div class="container hidden" id="quizBox">
    <div class="info-panel">
        <div id="displayName"></div>
        <div class="timer">समय शेष: <span id="time">30:00</span></div>
    </div>
    
    <div id="questionsContainer">
        </div>

    <button id="submitBtn" onclick="calculateScore()">फाइनल सबमिशन</button>
    <div id="resultArea" class="hidden"></div>
</div>

    let timer;
    let timeRemaining = 1800; // 30 minutes in seconds

    function startQuiz() {
        const name = document.getElementById('userName').value;
        if (!name.trim()) { alert("कृपया टेस्ट शुरू करने के लिए अपना नाम लिखें।"); return; }
        
        document.getElementById('loginBox').classList.add('hidden');
        document.getElementById('quizBox').classList.remove('hidden');
        document.getElementById('displayName').innerHTML = "<b>परीक्षार्थी:</b> " + name;
        
        renderQuestions();
        startTimer();
    }

    function renderQuestions() {
        const container = document.getElementById('questionsContainer');
        questions.forEach((q, index) => {
            const div = document.createElement('div');
            div.className = 'question-block';
            div.innerHTML = `
                <p><strong>Q${index + 1}. ${q.q}</strong></p>
                <div class="options">
                    ${q.options.map((opt, i) => {
                        const letter = String.fromCharCode(65 + i);
                        return `
                        <label id="label-${index}-${letter}">
                            <input type="radio" name="q${index}" value="${letter}"> (${letter}) ${opt}
                        </label>`;
                    }).join('')}
                </div>
            `;
            container.appendChild(div);
        });
    }

    function startTimer() {
        timer = setInterval(() => {
            timeRemaining--;
            let mins = Math.floor(timeRemaining / 60);
            let secs = timeRemaining % 60;
            document.getElementById('time').innerText = `${mins}:${secs < 10 ? '0' : ''}${secs}`;
            if (timeRemaining <= 0) {
                clearInterval(timer);
                alert("समय समाप्त हो गया है!");
                calculateScore();
            }
        }, 1000);
    }

    function calculateScore() {
        clearInterval(timer);
        let score = 0;
        const submitBtn = document.getElementById('submitBtn');
        submitBtn.disabled = true;
        submitBtn.style.background = "#ccc";
        submitBtn.innerText = "टेस्ट सबमिट हो चुका है";

        questions.forEach((q, index) => {
            const selected = document.querySelector(`input[name="q${index}"]:checked`);
            const correctAns = q.a;
            
            // सही उत्तर को हमेशा हरा करें
            document.getElementById(`label-${index}-${correctAns}`).classList.add('correct');

            if (selected) {
                if (selected.value === correctAns) {
                    score++;
                } else {
                    // गलत चुने गए उत्तर को लाल करें
                    document.getElementById(`label-${index}-${selected.value}`).classList.add('wrong');
                }
            }
        });

        const resultArea = document.getElementById('resultArea');
        resultArea.classList.remove('hidden');
        resultArea.innerHTML = `टेस्ट पूरा हुआ! <br> आपका स्कोर: ${score} / ${questions.length} <br> प्रतिशत: ${(score/questions.length*100).toFixed(2)}%`;
        
        // रिजल्ट दिखाने के बाद ऊपर स्क्रॉल करें या रिजल्ट सेक्शन पर ले जाएं
        resultArea.scrollIntoView({ behavior: 'smooth' });
    }
