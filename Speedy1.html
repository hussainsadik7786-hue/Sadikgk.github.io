<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Sadik GS Practice Test</title>

<style>

body{
font-family:Arial;
background:#f3f3f3;
padding:20px;
}

.watermark{
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
font-size:120px;
color:rgba(0,0,0,0.05);
z-index:-1;
}

#timer{
font-size:22px;
color:red;
font-weight:bold;
margin-bottom:20px;
}

.question{
background:white;
padding:15px;
margin-bottom:10px;
border-radius:8px;
}

.correct{
background:#c8f7c5;
}

.wrong{
background:#f7c5c5;
}

button{
padding:10px 20px;
font-size:16px;
margin-top:20px;
cursor:pointer;
}

</style>
</head>

<body>

<div class="watermark">Sadik</div>

<h2>GS Practice Test</h2>

<div id="timer">Time Left: 15:00</div>

<form id="quizForm"></form>

<button onclick="submitQuiz()">Submit Test</button>

<h3 id="result"></h3>

<script>

const questions = [

{
q:"भारत का संविधान भारत को किस रूप में वर्णित करता है?",
options:["राज्य संघ","संघ राज्य","लोकतांत्रिक गणराज्य","समाजवादी राज्य"],
answer:1
},

{
q:"मछलियों के यकृत तेल में कौन-सा विटामिन अधिक होता है?",
options:["विटामिन A","विटामिन B","विटामिन C","विटामिन D"],
answer:3
},

{
q:"पृथ्वी का एकमात्र उपग्रह कौन है?",
options:["मंगल","शुक्र","चंद्रमा","बुध"],
answer:2
}

];

const form=document.getElementById("quizForm");

questions.forEach((item,index)=>{

let div=document.createElement("div");
div.className="question";

let html="<p>"+(index+1)+". "+item.q+"</p>";

item.options.forEach((opt,i)=>{
html+=`<label>
<input type="radio" name="q${index}" value="${i}">
${opt}
</label><br>`;
});

div.innerHTML=html;
form.appendChild(div);

});

let time=900;

let timer=setInterval(()=>{

let m=Math.floor(time/60);
let s=time%60;

document.getElementById("timer").innerHTML=
"Time Left: "+m+":"+(s<10?"0":"")+s;

time--;

if(time<0){
clearInterval(timer);
submitQuiz();
}

},1000);

function submitQuiz(){

clearInterval(timer);

let score=0;

questions.forEach((q,i)=>{

let selected=document.querySelector(`input[name="q${i}"]:checked`);
let div=document.getElementsByClassName("question")[i];

if(selected){

if(Number(selected.value)===q.answer){

score++;
div.classList.add("correct");

}else{

div.classList.add("wrong");

}

}else{

div.classList.add("wrong");

}

});

document.getElementById("result").innerHTML=
"Your Score: "+score+" / "+questions.length;

}

</script>

</body>
</html>
