<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sadik's Quiz - Page 33</title>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; background-color: #fcfcfc; padding: 20px; }
        .quiz-container { max-width: 800px; margin: auto; background: #fff; padding: 25px; border-radius: 12px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); position: relative; }
        
        #timer-banner { position: sticky; top: 10px; z-index: 1000; background: #d32f2f; color: white; padding: 10px; text-align: center; font-size: 22px; font-weight: bold; border-radius: 8px; margin-bottom: 20px; }

        .question-box { position: relative; border: 1px solid #eee; padding: 20px; margin-bottom: 25px; border-radius: 10px; overflow: hidden; }
        
        /* साफ़ दिखने वाला लाल वॉटरमार्क */
        .question-box::after {
            content: "Sadik";
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%) rotate(-20deg);
            font-size: 80px;
            color: rgba(211, 47, 47, 0.06); 
            font-weight: bold;
            z-index: 0;
            pointer-events: none;
        }

        .q-text { position: relative; z-index: 1; font-size: 18px; font-weight: bold; margin-bottom: 12px; }
        .opt-list { position: relative; z-index: 1; list-style: none; padding: 0; }
        .opt-list li { background: #f9f9f9; border: 1px solid #ddd; padding: 12px; margin: 8px 0; border-radius: 6px; cursor: pointer; }
        .opt-list li:hover { background: #fef2f2; }
        
        .selected { border: 2px solid #d32f2f !important; background: #fdf2f2 !important; }
        .correct { background: #d4edda !important; border-color: #c3e6cb !important; color: #155724; }
        .wrong { background: #f8d7da !important; border-color: #f5c6cb !important; color: #721c24; }

        .btn-submit { width: 100%; padding: 15px; background: #d32f2f; color: white; border: none; border-radius: 8px; font-size: 18px; cursor: pointer; }
        #score-view { display: none; text-align: center; font-size: 24px; padding: 20px; border: 2px dashed #d32f2f; border-radius: 10px; margin-bottom: 20px; }
        
        #name-screen { text-align: center; padding: 40px; }
        #name-in { padding: 10px; width: 250px; font-size: 18px; border-radius: 5px; border: 1px solid #ccc; margin-bottom: 15px; }
    </style>
</head>
<body>

<div class="quiz-container" id="login">
    <h2>स्वागत है! अपना नाम लिखें</h2>
    <input type="text" id="name-in" placeholder="आपका नाम...">
    <br>
    <button class="btn-submit" style="width: auto; padding: 10px 40px;" onclick="start()">शुरू करें</button>
</div>

<div class="quiz-container" id="quiz-main" style="display:none;">
