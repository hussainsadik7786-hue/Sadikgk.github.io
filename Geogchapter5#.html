<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<title>Agriculture MCQ Test</title>

<style>
body{
font-family: Arial;
background:#f2f2f2;
padding:20px;
}

#quizBox{
background:white;
padding:20px;
border-radius:10px;
max-width:900px;
margin:auto;
}

.correct{
color:green;
font-weight:bold;
}

#timer{
font-size:20px;
color:red;
margin-bottom:20px;
}

button{
padding:10px 20px;
font-size:16px;
}
</style>
</head>

<body>

<div id="quizBox">

<h2>Agriculture MCQ Test</h2>

<div id="startPage">
<h3>Enter Your Name</h3>
<input type="text" id="studentName" placeholder="Your Name">
<br><br>
<button onclick="startTest()">Start Test</button>
</div>

<div id="quizPage" style="display:none">

<div id="timer">25:00</div>

<form id="quizForm">

<p>1. सोयाबीन उत्पादन में अग्रणी राज्य?</p>
<input type="radio" name="q1" value="a"> मध्य प्रदेश<br>
<input type="radio" name="q1" value="b"> उत्तर प्रदेश<br>
<input type="radio" name="q1" value="c"> गोवा<br>
<input type="radio" name="q1" value="d"> बिहार<br>

<p>2. चाय उत्पादन में अग्रणी राज्य?</p>
<input type="radio" name="q2" value="a"> गुजरात<br>
<input type="radio" name="q2" value="b"> बिहार<br>
<input type="radio" name="q2" value="c"> असम<br>
<input type="radio" name="q2" value="d"> सिक्किम<br>

<p>3. चीनी उत्पादन में अग्रणी राज्य?</p>
<input type="radio" name="q3" value="a"> बिहार<br>
<input type="radio" name="q3" value="b"> महाराष्ट्र<br>
<input type="radio" name="q3" value="c"> गोवा<br>
<input type="radio" name="q3" value="d"> उत्तर प्रदेश<br>

<!-- Aap baaki questions yahi same format me paste kar sakte hain -->

<br><br>
<button type="button" onclick="submitTest()">Submit Test</button>

</form>

</div>

<div id="result"></div>

</div>

<script>

let answers = {
q1:"a",
q2:"c",
q3:"d"
};

let time = 1500;
let timer;

function startTest(){

let name = document.getElementById("studentName").value;

if(name==""){
alert("Please enter your name");
return;
}

document.getElementById("startPage").style.display="none";
document.getElementById("quizPage").style.display="block";

timer=setInterval(updateTimer,1000);
}

function updateTimer(){

let minutes=Math.floor(time/60);
let seconds=time%60;

document.getElementById("timer").innerHTML=
minutes+":"+ (seconds<10?"0":"")+seconds;

time--;

if(time<0){
clearInterval(timer);
submitTest();
}
}

function submitTest(){

clearInterval(timer);

let score=0;

for(let q in answers){

let selected=document.querySelector('input[name="'+q+'"]:checked');

if(selected && selected.value==answers[q]){
score++;
}
}

let name=document.getElementById("studentName").value;

document.getElementById("quizPage").style.display="none";

document.getElementById("result").innerHTML=

"<h2>Result</h2>"+
"<p>Name : "+name+"</p>"+
"<p>Score : "+score+" / "+Object.keys(answers).length+"</p>";

}

</script>

</body>
</html>
